services:
  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run start"
    volumes:
      - ./server:/app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://employepro:changeme@db:5432/employepro
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: employepro
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: employepro
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U employepro"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
